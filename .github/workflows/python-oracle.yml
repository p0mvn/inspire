name: Python Oracle

on:
  pull_request:
    paths:
      - ".github/workflows/python-oracle.yml"
      - "inspiring/tools/python-oracle/**"
  push:
    paths:
      - ".github/workflows/python-oracle.yml"
      - "inspiring/tools/python-oracle/**"

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: inspiring/tools/python-oracle

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: inspiring/tools/python-oracle/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v
